name: Agent Evals

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1"   # Weekly Monday 10:00 UTC — live routing eval
  workflow_dispatch:
    inputs:
      run_routing:
        description: "Run agent routing eval (live, non-blocking)"
        required: false
        default: "true"

jobs:
  deterministic-evals:
    name: Full Deterministic Eval Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full deterministic eval suite
        run: bun run eval --suite prompt-contracts --baseline evals/baselines/prompt-contracts.json --fail-on-regression

      - name: Run smoke baseline comparison
        run: bun run eval --suite prompt-smoke --baseline evals/baselines/prompt-smoke.json --fail-on-regression

      - name: Verify eval coverage
        run: bun run eval:coverage

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-artifacts
          path: .weave/evals/
          if-no-files-found: ignore

  detect-prompt-changes:
    name: Detect Agent Prompt Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    outputs:
      prompts_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for prompt file changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD -- 'src/agents/**/default.ts' 'src/agents/**/prompt-composer.ts' | head -1)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Prompt files changed — will trigger live routing eval"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No prompt files changed"
          fi

  agent-routing:
    name: Agent Routing (${{ matrix.name }})
    needs: [detect-prompt-changes]
    if: >-
      always() && (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && inputs.run_routing == 'true') ||
        needs.detect-prompt-changes.outputs.prompts_changed == 'true'
      )
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      models: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GitHub Models / gpt-4o-mini
            provider: github-models
            model: gpt-4o-mini
            model_key: github-models/gpt-4o-mini
            artifact_name: github-models-gpt-4o-mini
          - name: OpenRouter / openai/gpt-5.4
            provider: openrouter
            model: openai/gpt-5.4
            model_key: openrouter/openai/gpt-5.4
            artifact_name: openrouter-openai-gpt-5-4
          - name: OpenRouter / anthropic/claude-opus-4.6
            provider: openrouter
            model: anthropic/claude-opus-4.6
            model_key: openrouter/anthropic/claude-opus-4.6
            artifact_name: openrouter-anthropic-claude-opus-4-6

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run agent routing eval (live)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EVAL_PROVIDER: ${{ matrix.provider }}
          EVAL_MODEL: ${{ matrix.model }}
          EVAL_MATRIX: ${{ toJson(matrix) }}
          RUN_PATH: .weave/evals/runs/${{ matrix.artifact_name }}.json
        run: bun run eval --suite agent-routing --provider "$EVAL_PROVIDER" --model "$EVAL_MODEL" --output "$RUN_PATH"

      - name: Upload routing eval artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: routing-eval-run-${{ matrix.artifact_name }}
          path: |
            .weave/evals/
            .weave/evals/runs/${{ matrix.artifact_name }}.json
          if-no-files-found: ignore

  agent-routing-fanin:
    name: Agent Routing Fan-In
    needs: [agent-routing]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download routing eval run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: routing-eval-run-*
          path: .artifacts/routing-runs
          merge-multiple: false

      - name: Merge run artifacts into canonical JSONL
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          jsonl_path = Path('evals/results/agent-routing.jsonl')
          jsonl_path.parent.mkdir(parents=True, exist_ok=True)

          runs_by_id = {}
          if jsonl_path.exists():
            for line in jsonl_path.read_text().splitlines():
              line = line.strip()
              if not line:
                continue
              parsed = json.loads(line)
              run_id = parsed.get('runId')
              if run_id:
                runs_by_id[run_id] = parsed

          for path in sorted(Path('.artifacts/routing-runs').glob('**/*.json')):
            parsed = json.loads(path.read_text())
            run_id = parsed.get('runId')
            if run_id:
              runs_by_id[run_id] = parsed

          ordered = sorted(
            runs_by_id.values(),
            key=lambda run: (run.get('startedAt', ''), run.get('runId', '')),
          )

          with jsonl_path.open('w', encoding='utf-8') as fh:
            for run in ordered:
              fh.write(json.dumps(run, separators=(',', ':')) + '\n')
          PY

      - name: Generate per-model trend reports
        if: always()
        continue-on-error: true
        run: |
          bun run script/eval-trend-report.ts --suite agent-routing --model-key github-models/gpt-4o-mini --check --threshold 0.80
          bun run script/eval-trend-report.ts --suite agent-routing --model-key openrouter/openai/gpt-5.4 --check --threshold 0.80
          bun run script/eval-trend-report.ts --suite agent-routing --model-key openrouter/anthropic/claude-opus-4.6 --check --threshold 0.80

      - name: Commit canonical routing history
        if: github.ref == 'refs/heads/main' && always()
        run: |
          git add evals/results/agent-routing.jsonl
          git diff --cached --quiet || git -c user.name='github-actions[bot]' -c user.email='github-actions[bot]@users.noreply.github.com' commit -m "chore(evals): update agent-routing trend results [skip ci]"
          git pull --rebase || true
          git push

      - name: Upload merged routing artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: routing-eval-artifacts
          path: |
            .weave/evals/
            evals/results/agent-routing.jsonl
          if-no-files-found: ignore
